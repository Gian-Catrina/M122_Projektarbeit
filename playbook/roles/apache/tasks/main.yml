---
- name: installiere apache2
  ansible.builtin.apt:
    name: apache2
    state: present

- name: setze minimalistische index.html
  ansible.builtin.copy:
    content: "hi it worked"
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  notify: restart apache
